onboarding = false

[theme]
# Ghostty のテーマ (Zenwritten Dark) にそのまま追従させる
name = "terminal"

[keys]
# zellij tmux モードの d (Detach) に合わせる (デフォルトは prefix+q)
detach = "prefix+d"
# zellij の Alt+hjkl ペイン移動に合わせた直接バインド (デフォルトは prefix+h/j/k/l)
focus_pane_left = "alt+h"
focus_pane_down = "alt+j"
focus_pane_up = "alt+k"
focus_pane_right = "alt+l"
# タブ移動はデフォルトの prefix+p / prefix+n (option+左右キーは下の nav.sh に割り当て)
# 新規ワークスペース作成 (デフォルトは prefix+shift+n で押しにくいため直接バインドに変更)
new_workspace = "alt+n"

# option + 矢印キーはペイン優先のハイブリッド移動 (nav.sh 参照)
# その方向にペインがあればペイン移動、なければ左右=タブ / 上下=ワークスペース移動
[[keys.command]]
key = "alt+left"
type = "shell"
command = "sh ~/.config/herdr/nav.sh left"
description = "ペイン優先で左移動 (なければ前のタブ)"

[[keys.command]]
key = "alt+right"
type = "shell"
command = "sh ~/.config/herdr/nav.sh right"
description = "ペイン優先で右移動 (なければ次のタブ)"

[[keys.command]]
key = "alt+up"
type = "shell"
command = "sh ~/.config/herdr/nav.sh up"
description = "ペイン優先で上移動 (なければ前のワークスペース)"

[[keys.command]]
key = "alt+down"
type = "shell"
command = "sh ~/.config/herdr/nav.sh down"
description = "ペイン優先で下移動 (なければ次のワークスペース)"

[ui]
agent_panel_sort = "priority"
# window (タブ) 追加時の名前入力プロンプトをスキップし、即座に作成する
prompt_new_tab_name = false

[advanced]
# zellij の scroll_buffer_size 100000 (デフォルト10倍) に合わせて 10MB → 100MB
scrollback_limit_bytes = 100_000_000
